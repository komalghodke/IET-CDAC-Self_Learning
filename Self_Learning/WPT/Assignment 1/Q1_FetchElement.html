<!DOCTYPE html>
<html>
<head>
  <title>Single Element</title>
  <p> 1. Write a jQuery program to get a single element from a selection of elements of a 
HTML page. </p>
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>
  <p>First</p>
  <p>Second</p>
  <p>Third</p>

  <script>
    $(function(){
      alert($("p").eq(0).text());
    });
  </script>
</body>
</html>
