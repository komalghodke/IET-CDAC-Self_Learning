<!DOCTYPE html>
<html>
<head>
  <title>Hide Headings & Mouse Position</title>
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>
  
  <p> 4. Write a jQuery program to hide all headings on a page when they are clicked. o Also 
find the position of the mouse pointer relative to the left and top edges of the 
document 
  </p>
  <h1>Heading 1</h1>
  <h2>Heading 2</h2>
  <p id="pos"></p>

  <script>
    $(function(){
      $("h1,h2,h3,h4,h5,h6").click(function(){ $(this).hide(); });
      $(document).mousemove(function(e){
        $("#pos").text("X:"+e.pageX+" Y:"+e.pageY);
      });
    });
  </script>
</body>
</html>
