<!DOCTYPE html>
<html>
<head>
  <title>Click Events</title>
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>
  <p> 3. Write a jQuery program to attach a click and double-click events to all elements. </p>
  <div>Click or Double-click me</div>

  <script>
    $(function(){
      $("p").click(function(){ alert("Clicked!"); });
      $("div").dblclick(function(){ alert("Double-clicked!"); });
    });
  </script>
</body>
</html>
