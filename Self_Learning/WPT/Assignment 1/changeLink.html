<!DOCTYPE html>
<html>
<head>
  <title>Change Link</title>
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>
    <p> 2. You are having sample data for the link. Write jQuery code to change the hyperlink 
and the text of an existing link. </p>
  <a id="link" href="https://old.com">Old Link</a>

  <script>
    $(function(){
      $("#link").attr("href","https://google.com").text("Go to Google");
    });
  </script>
</body>
</html>
