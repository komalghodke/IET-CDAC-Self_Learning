<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<title>Library Books</title>
</head>
<body>
	<h2>Library Books</h2>
	<a th:href="@{/add}">Add New Book</a>
	<table border="1">
		<tr>
			<th>ID</th>
			<th>Title</th>
			<th>Author</th>
			<th>ISBN</th>
			<th>Available</th>
			<th>Actions</th>
		</tr>
		<tr th:each="book : ${books}">
			<td th:text="${book.id}"></td>
			<td th:text="${book.title}"></td>
			<td th:text="${book.author}"></td>
			<td th:text="${book.isbn}"></td>
			<td th:text="${book.available}"></td>
			<td><a th:href="@{/edit/{id}(id=${book.id})}">Edit</a> | <a
				th:href="@{/delete/{id}(id=${book.id})}">Delete</a></td>
		</tr>
	</table>
</body>
</html>
