<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<title>Add Book</title>
</head>
<body>
	<h2>Add Book</h2>
	<form th:action="@{/save}" th:object="${book}" method="post">
		Title: <input type="text" th:field="*{title}" /><br> Author: <input
			type="text" th:field="*{author}" /><br> ISBN: <input type="text"
			th:field="*{isbn}" /><br> Available: <input type="checkbox"
			th:field="*{available}" /><br> <input type="submit" value="Save" />
	</form>
	<a th:href="@{/}">Back</a>
</body>
</html>
